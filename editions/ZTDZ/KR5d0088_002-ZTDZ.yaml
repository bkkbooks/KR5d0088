  text: 玄教大公案卷下下二
  hash: sha256:311cfe184885822f5f087e0f7c0b676b406a95fc4ba624d528f6a323637bfe3a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0088_SJB_002-230900c, image: sjb/23/230900c.png}
body:
  text: 金蓮道師實菴先生苗太素舉門人誠菴王志道集第三十七則文始眞經云不可非世是已不可卑人尊己不可輕忽道已不可訕謗德己不可鄙猥才已夫非世人而是己自是也小看人而尊己自高也輕忽人而重己自尊也以毁謗人而德己自能也以人鄙愚猥瑣而才己自矜也大衆已上五事文始眞人力救我輩學人節病當直下明悟反照如或有一速當悔改做箇好道人若撥無因果昧己不改從此五事生五般毒氣將來自禍自患必然自是不改積生凶惡之氣自高不改積生强豪之氣自慢不改積生驕欺之氣自能不改積生愠怒之氣自矜不改積生矯傲之氣如是之氣皆係禀賦輕薄血氣之性俗風染污習氣之性使然既有此五毒則生嗔恨煩惱災厄苦楚自爲障魔德行俱喪至本然眞性煙霧昏昧如此矣尚言明心見性硬誇玄妙禪機正所謂掩耳偷鈴嘻愼之愼之頌曰貧者生來太蠢癡無聞無見更無知人間鄙拙無如我豈我人前弄爪蹄第三十八則文始眞經云昔之論道者或曰凝寂或曰邃深或曰澄徹或曰空同或曰晦㝠愼勿遇此而生怖退天下至理竟非言意苟知非言非意在彼微言妙意之上乃契吾說大衆此一章痛鍼我輩執著言辭以爲玄妙墜於一邊不能圓混大同誠悟不可言之精妙直超最上方契合文始眞經實理當在語言之外承當頌曰凝寂爲頑靜邃深屬幻陰空同何實際澄徹入昏沉㝠晦幽無照微言墮法塵一齊無礙了慶快樂天心第三十九則冲虛經云有人憂天地壞眞人解之曰彼一也此一也故我生不知死死不知生來不知去去不知來壞與不壞吾何容心哉又云精神入其門骨骸反其根我尚何存大衆死生猶晝夜去來若冬春故聖人明達此妙生死去來心一太虛都忘所知自然而然此身亦天地故云彼此一也乃知精神反本幻化歸空一眞同乎今日超然巍獨何必更問我尚何存諸公若各向此了得只今便請如此休待末後再去商量頌曰幻化有形終有壞眞元無象故常存只今一切了無礙超然三界獨稱尊第四十則冲虛經云魯君聞亢倉子深得太上之道能以耳視而目聽使上卿厚禮聘至魯君卑辭請問亢倉子曰傳之者妄矣我能視聽不用耳目不能易耳目之用魯君曰此增易矣其道奈何寡人終願聞之亢倉子曰我能體合於心心合於炁炁合於神神合於無其有介然之有惟然之音雖遠在八荒之外近在眉睫之間來干我者我必知之乃不知是我七孔四肢之所覺心腹六臟之所知其自知而已矣魯君大悅以告孔子孔子笑而不答大衆忘我造玄虛心體道則身心圓混神炁妙融是以一性太虛六根互用大哉眞人圓證若此惜乎魯君雖樂然敬愛之被貴榮聲色迷昧不能了悟以告宣尼且道何故宣尼不答叅頌曰三元冲妙歸無極一性圓輝體太空誠會六根源一混不圓通處亦圓通第四十一則列仙冲虛經云龍叔有十般病求文摯醫文摯問其病證龍叔曰吾鄉譽不以爲榮國毁不以爲辱得而不喜失而不憂視生如死視富如貧視人如己視己如人處家如旅舍吾鄉如他國凡此衆疾爵賞不能勸刑罰不能威盛衰利害不能易哀樂不能移此奚疾也文摯向明視之曰嘻子方寸虛矣幾聖人也子心六孔流通而一孔不達今子以聖智爲疾非吾淺術所能也大衆龍叔之病榮辱得失死生貧富人我視之一笑故爲病也所以證聖智圓通六通無礙自然而然矣夫何故復云一孔不達請諸公默默中叅如叅得這一孔通達則無漏矣頌曰龍叔十般病逹人當悟證六通無礙遮識性空天性向上竅豁開一眞融慧命性命了圓成玉質金堅瑩第四十二則冲虛經云無所由而常生者道也由生而生雖終而不忘常也故無用而生謂之道用道得終謂之常無所用而死者謂之道用道得死者謂之常大衆此一篇發明大道體常無齗滅相也所謂無所由而常乃無所從來不知生爲生乃道也生而無生身雖死而本性不亡乃常也故無用而生謂之道體道得終謂之常以此明悟眞常妙道體乎自然何必憂乎無常頌曰日月有明暗大虛無暗明性本太虛體生滅奚變更噫任他桑海變一點湛然清第四十三則南華老仙云明於天通於聖六通四達云昧然無不靜者矣聖人之靜也非曰靜也善故靜也萬物無足以撓心者故靜也水靜猶明燭鬚眉平中准大匠取法焉水靜獨明而況聖人精神之心乎大衆此一章專言一箇靜字學人常常多被逆順境遷事物障礙不能耐煩欲尋箇幽靜處休歇去殊不知又添箇尋靜的念頭到那幽僻處又有許多勞攘可憐哉南華老仙以一善字發明眞靜明妙工夫的切所謂善者非曰善惡之善乃聖人之良能也聖人之心虛明空廓清靜圓輝如懸寳鑑物來則照物去則空無有色相好醜一心澄徹萬里昭然豈不簡妙故以水靜猶能清平燭物況人之一點靈明乎誠能于此透徹事休擾擾心絶營營做箇清閑道人多少輕快也頌曰動靜不居去來無礙四威儀中得大自在爲其無爲利而不害一點虛空大周沙界第四十四則南華老仙齊物篇首以二子答問三籟始言人籟地籟之不齊便是孟子云物之不齊物之情也末言天籟云吹萬不同而使其自已謂衆竅怒息萬籟澄虛時是誰耶前言情後言理理一分殊賔主自别不齊之齊明矣就中廣喻以明物之生化無窮萬化一化皆神末以己夢蝴蝶爲喻結一篇之大義倏然夢栩栩然蝴蝶也俄然覺蘧蘧然周也不知周之夢爲蝴蝶與蝴蝶之夢爲周與周之與蝶則必有箇分限到此恰不說破大衆且道只今誰夢誰覺誠能直下明悟分曉則知生死夢覺則齊歸於大化其中有卓然巍獨者存故曰有此大覺則然後知此大夢也其或未然聽吾後頌曰物我同胞體一源不齊齊處亦方圓隨情各造輪迴殻反本同歸太極圈萬籟寂然天籟息一心清肅識心濳化生生化由他變夢覺雙忘樂象先第四十五則南華老仙云孔子教顔子心齋回曰敢問心齋孔子曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齋也回曰回之未始得使實自回也得使之也未始有回也可謂虛乎孔子曰盡矣大衆宣聖以一虛字授顔子心齋㫖哉顔子一聞而頓徹直超聖境云未始有回也可謂虛乎謂頓然忘我不知有回也宣聖許其盡矣夫視聽言嗅四者宣聖止以聽聞直指何也以耳聽乃衆人之聽惟隨聲而已以心聽乃賢人之聽得符契也聽之以氣聖人之聽反本也夫人生以來各賦一太虛各禀一元炁也心虛則元炁冲融炁息則靈明朗徹非即非離互體妙用可謂心路斷絶性天瑩潔故曰虛室生白吉祥止止致虛之極天光瑩發玄之又玄矣宜乎釋氏觀音圓通大行自聞中而入得成道果故號觀音先聖性與天道盡在是矣豈不可得而聞乎噫珍重頌曰口素心不素安能達本來不欺誠道戒無昧即心齋神谷無鑯染靈臺絶點埃太虛清徹朗慧日曜天階第四十六則南華老仙秋水一篇河伯海若凡六答問如風濤激石雪浪翻空使人驚心喪膽恍惚茫然及乎至篇末清澄碧海光映蒼天使人神淸氣息寧極反眞大衆夫何故反乎要都歸結在道理權三字上故曰達道者必明於理達於理者必明於權明於權者不以物害己又言察乎安危寧於禍福謹於去就莫之能害故曰天在内人在外夫天在内純粹不雜而大體正人在外應變無方而大用和是以圓混混活潑潑道以理貫事以權行安危去就體天應人禍患魔害自何而有到這裏河伯心㝠神契無後再問宜乎東坡云三日不讀南華秋水篇則口臭文不光誠能明悟日用自然無一切魔軍有無量眞樂珍重頌曰河伯見秋水泛濫泊隄起及乎見海若望洋嘆不已井底蛙窺天海中鱉見恥見量然淺深貴乎各知理大體大機權吉凶當反己體道素安常樂天任終始第四十七則南華老仙云徹志之勃解心之謬去德之累達道之塞貴富顯嚴名利六者勃志也容動色理氣意六者謬心也惡欲喜怒哀樂六者累德也去就取與知能六者塞道也此四六者不盪胷中則正正則靜靜則明明則虛虛則無爲而無不爲也大衆徹志解心去累達塞各有六事皆是我等障魔悖理則天道不通故徹之謬心則事情牽纏故解之德累則處斷不明故去之物塞則中不虛徹故達之皆人欲也此四六不蕩於胷中則致中正清靜明朗虛通能如是足可以隆道厚德成性了心此一篇南華老仙特提掇後學的切工夫漸入佳境細細咀嚼多少意味珍重頌曰凡情人欲衆四六障天機省事心無謬忘縁志不非情空德絶累性著意無疑正靜心虛徹無爲無不爲第四十八則南華老仙嘗言有始也者有未始有始也者有未始有夫未始有始也者有有也者有無也者有未始有無也者有未始有夫未始有無也者俄而有無矣而未知有無之果有謂乎果無謂乎此一節五言未始前解者不一然互有得失皆未著實使人愈見迂闊有以列仙五太解證稍通殊不知只以此身有無乃至眞無妙有又融一未始一節抵一節果謂奇奇妙妙眞眞純純且如此身一有自何而來因一念而有也即知念乃身之未始念自心生即知心乃念之未始心自性生即知性乃心之未始有是炁即有是性即知命乃性之未始本然慧性眞無也眞空慧命妙有也眞無妙有融一未始乃太極未肇父母未生一眞實象是謂玉虛妙體清淨道身無始之始也大衆從此處顚倒究竟將去一節高一節漸入佳境到這裏則知天地與我並生萬物與我爲一種種是非彼我聲色有無皆爲空華陽焰眞樂自然豈不簡妙乎聽聽頌曰南華五未始從頭追到底此念自心生一心從性起性依命根生性命同一軌妙有融眞無玄玄玉虛體志士明悟誠眞樂無生矣第四十九則南華老仙設一喻使人即物理以明心達天機而悟道然其意宻宻深深造其微竒竒特特言夔憐蚿蚿憐蛇蛇憐風風憐目目憐心六事蚿即蜈蚣也始以三物引起至風目心大體妙用造化天機朗朗明白以夔蚿足之多少喻唾之噴大小珠霧及蛇之無足而行又疾喻聖人動止運化屈伸相感遲疾亦應乎天機皆自然而然次以風之蓬蓬然起於北海入於南海反陰復陽倏忽起滅比夫有形相之物又超一竒絶末後目與心洽不說破大衆還會得否其或未然實菴借口張揚諸公貴誠默契夫人之目一舉萬里天涯海角都在眼底心之一動大地山河盡在此中其天機舉動可謂不行而至不疾而速可不戒愼而返觀哉如風之初起似乎勢力輕微及乎撼山抜木從微至大我之呼吸造化工夫亦復如是諸公直下曉了大機妙用自然不費心力頌曰大道無不在物物總含容夔蹢疾如蚿蛇飛遲似風天機融紫極玄理體黄中泯識有無有忘情空不空反觀心宻妙覿面主人公第五十則黄帝聞廣成君隱於崆峒山退捐天下築特室席白茅靜居三月而徃問道廣成君南面而卧黄帝順下風膝行而進再拜稽首而問曰吾聞子達於至道敢問治身奈何長久廣成君蹴然而起曰善哉問來吾語汝至道之精窈窈㝠㝠至道之極昏昏默默無視無聽抱神而靜形將自正必靜必清無勞汝形無揺汝精惟湛然方寸無使營營心無所知汝神將守形彼其物無窮而人皆以爲終得吾道者入無窮之門遊無極之野大衆夫人之本來元神不能守舍蓋由情生心擾念動精揺之故廣成君教帝心無知擾神將自守㫖哉黄帝大聖人尚如此席茅齋心三月膝行跪于下風叅師問道我輩何人猶不能如是安得入神於無窮之門遊無極之野哉噫頌曰心絶營營神在舍精無揺動氣歸根炁神綿宻中中息直入玄元衆妙門第五十一則南華經云黄帝遊赤水之上登崑崙之丘而南望還歸遺其玄珠使智索之而不得使離珠索之而不得使喫詬索之而不得乃使罔象罔象得之黄帝曰異哉罔象可以得之乎大衆此一玄珠人人中具耀古輝今光天徹地只爲物慾塵障事情雲蔽明見馳騁智識縱横所以昧失此珠幸有欲見此珠者又即言辭而求者或以聰明揣度而求者又以智識思求者明求愈遠智索愈遥故黄帝以此三人求尋而皆不得後以罔象罔象得之何謂也使人離其語言知識忘乎聦明見解誠意於丹丘之上淵心於罔象之中一點圓明自然朗徹豈不簡妙哉再審後頌曰一顆無價珠沉埋被泥淤聦明智揣摸都屬者之乎濳心歸罔象不覺珠光浮一躍出清淵圓明耀太虛第五十二則南華經云齧缺問道於被衣被衣曰若正汝形一汝視天和將至攝汝知一汝度神將來舍德將爲汝美道將爲汝歸汝瞳然若新生之犢而無求其故言未終齧缺若睡寐已忘形被衣大悅行歌而去大衆古人一聞至道形忘心醉復本然之至善所謂正形一視誠全而含光不二也攝知一度無思而凝神精一也故若新生之犢其純全而無心也心神一混物我兩忘不知所以然而然宜乎本師眞樂而歌眞其實知不以故自持至哉仐我輩然業重福輕急不能如是誠能信得及誠誠默宻便如此做將去工夫純熟時亦自然而然頌曰屏智黜聰明含光妙一誠被衣云未盡齧缺已忘形道契心純玉情空性潔冰太虛風息息天籟寂無聲第五十三則南華老仙云道固不小行德固不小識小識傷德小行傷道故云正己而已矣樂全之謂得志古之所謂得志者非軒冕之謂也謂其無以益其樂而已矣今之所謂得志者軒冕之謂也軒冕在身非性命也物之倘來寄也大衆聖人以寳貴精神安和性命爲樂全故安貧樂道不以軒冕爲榮而喪清高志節況乎窮約趍俗小識小行而爲道德之累哉喪己於物失性於俗何足道哉戒之愼之頌曰世事如雲變炎涼反掌間利名心冷淡道德性芝蘭有用心流浪無求志泰山綽然無繫礙大志樂閑閑第五十四則南華仙宴息東郭子敬問曰所謂道惡乎在眞人曰無所不在郭曰期而後可眞人指前蟻曰在螻蟻曰何其下耶曰在稊稗曰何其愈下耶眞人指空地曰在瓦礫曰何其愈甚耶曰在屎溺東郭子不會拙哉吾太上云道之在天下猶川谷之於江海又云大道汎兮其可左右宣聖云形而上者謂之道形而下者謂之器以此推則曉南華老仙假目前物類發明道之本元惜乎東郭子全無領悟夫道物物全彰頭頭具足此無所不在也猶我之一點舉曰無際何所徃而非道乎乃知老仙始一句以露心肝後四答乃第二機不獲己也大衆誠能向眞人始一句以前會得則巍然獨存綽然無礙矣諸大德會否噫今禪家庭前柏樹堂内酒臺麻三斤脇三拳乾屎橛佛糞堆種種公案皆從此中來所以長者馮尊師言鳩摩羅什未生已有南華列子朱文公云禪自道家起今衲子翻頭換面發明豈不然哉諸公直下無疑融會了徹則萬法中通三家一貫更何爭能好勝人我是非且得忻樂太平作箇超塵大丈夫豈不美歟頌曰萬物三寸道一元未曾舉處已昭然南華的意全彰妙東郭疑心不造玄濁氣昏蒙迷本性清風渙徹見先天六通四達全無礙三教收來一箇第五十五則南華老仙云後世學者不幸不見天地之純古人之大體道術將爲天下裂如惠施之學以萬物畢同畢異天地爲一體天下之辯士相與樂之如言卵有毛鷄三足郢有天下犬可以爲羊馬有卵丁子有尾火不熱山出口輪不踞地目不見指不至至不絶龜長於蛇矩不方䂓不可以爲圓鑿不圍枘飛鳥之影不動鏃矢之疾而有不行不止之時狗非犬黄馬驪牛三白狗黑狐駒未嘗有母一尺之棰曰取其半萬世不竭辯士以此與惠施相應終身無窮然惠施之談自以爲最賢飾人之心易人之意能勝人之口不能服人之心常欲以勝人爲名弱於德强於物駘蕩而不得逐物而不反窮響聲形與影競走悲夫大衆南華老仙特舉惠施之才爲一經之結意其後世之人氣輕福薄不復天地之純聖人之大體專尚機鋒敏捷問長答短問東答西問有答無急無可答反使人叅教小輩利曰之縱横捷君子木訥而難對一片勝心自尊自大鼓誘鄙俗誑惑愚夫闊說大言自爲普化迤迤習成滛風傷哉易曰咸其輔頰舌又云憧憧徃來朋從爾思正謂此也諸大善人誠能勘破此等明悟了達當含光内燭寳毓天和毋似此徒張皇誑妄當反朴還淳止此而已頌曰學道修心反朴淳朴淳不必更思尋口頭三昧空摇舌眼底百端錯用心墨子儉勤猶可取惠施詭譎實難箴不言言妙誠通徹淵默雷轟震大音第五十六則純陽帝君云悟眞常不達命此是修行第一病只修祖性不修丹萬劫陰靈難入聖紫陽眞人云饒君了悟眞如性未免抛身却入身爭似更能修大藥頓超無漏作眞人大衆今之說明心見性者皆以揚眉瞬目竪指舒拳敲喝語默應對爲了能以此學解以此識神認作本然眞性爲眞的當自謂無疑罷叅只這一邊事尚未著實況乎與語眞空慧命末後大事遠之遠矣深可憐哉祖師以此二詩警拔志士可謂痛切惜平我輩薄福力量輕微不能前進況有守腎守臍守心守腦努力搬運屈伸作爲種種泥形著相爲命基工夫亦可憐哉且道如何是端的默息去默息去頌曰活通大象鼻孔突出元獅眼睛兩箇打成一片千和萬合沖凝恍惚綿綿宻宻自然圓混太清篤志若山了得長春至樂無生第五十七則周易繫辭孔聖謂窮理盡性以至于命又云聖人以此洗心退蔵于宻大衆這箇宻處便是聖人安身立命處不可以知識思求亦非耳目視聽當至至誠誠洗得心上潔潔淨淨明明朗朗方可得退蔵于此故聖人以窮理爲先理窮則性盡理即心也故心虛明則性寂朗工夫至此明寂湛然與太虛體一時是可至于慧命眞空末後大事汝等欲知之乎欲行之乎噫頌曰性無命不處命無性無主性命一圓融自然隱乎此眞火炎太虛慧風輕鼓舞霎時天地鎔太極圓如許第五十八則周濓溪與伊川云看畢嚴經一部不如看一艮卦大衆以一艮卦能盡得畢嚴經義乎衆默然熏禮請開發曰艮止也重艮爲艮止之又止止于至善息乎大中聖人能事已矣故卦辭艮其背不獲其身行其庭不見其人無咎背與心相對不曰艮心而曰艮背者心忘已矣心忘己自然人我兩忘聲色俱泯造先天之妙境何世間之災咎豈不簡妙哉華嚴經至妙之理不過如是中間廣喻四菩薩即易四象八金剛即八卦復姤兩卦十二爻即一年節候龍女七歲成男卦有六爻剥坤第七變爲復震震爲長男陽龍之象故喻七歳成男純一不雜乾陽之象故喻善財童子天地五十五數善財五十三叅末叅大天神至地神即大哉乾元至哉坤元也叅合也恰好五十五數成純陽乾數故爲八十一卷皆易中聖人之緒餘也故周夫子以看一艮卦勝看一部華嚴經豈不然哉雖然若云大聖人超出乾坤之表巍獨无極之眞此亦謂之緒餘大衆能會得否頌曰止之又止止無止當於言象外叅求艮心艮背歸无極忘我忘人混大冲大易羲皇元罔象華嚴長者體洪濛一齊止止全無法玄又玄兮空不空第五十九則周易離卦第三爻日昊之離不鼓缶而歌則大耋之嗟凶此一卦爻聖人發明人之遊魂爲變生死之說離麗明也人之前明將盡後明相隨如日之傾昊入地這一點靈明昏晦到這裏隨時處順鼓缶樂天則明明相繼自然而然不達死生之理到這裏手忙脚亂氣濁心荒嗟嘆無主凶也這箇凶非處世吉凶之凶這一凶是一念有差翻軀換殻又不知作甚麽物類也此凶不可言嘻大衆到這裏若之何理會衆禮請開發大衆到這般時旋理會則遲了也要在乎只今便理會所以離卦第五爻云畜牝牛亨人之嗜利趨名隨情逐物恃明好察騁俊矜能何嘗反照這點靈明聖人設一畜牝牛爲喻畜牧養也牛乃順獸牝牛順而柔也只今反照虛中含光内燭如牧牛相似向一切逆順聲色調和爲工夫久久馴熟柔順安恬習俗血氣之性自然消殞本然眞性自然清眞到這裏夢覺如晝夜之相待死生若冬春之繼旋何凶之有禪家牧牛之說亦倣於此雖然若大聖人形神俱妙無生無死之玄此亦是第二機珍重珍重頌曰一從拏住這頑牛三股芒繩穿鼻頭略自侵禾加棒捶星兒落草便鞭抽昔時未鍊頑而拗今日調馴順且柔鞭索頓忘無箇事山前卧月睡𪖙𪖙第六十則周易繫辭云易無體神無方又云易無思也無爲也寂然不動感而遂通乃知無體之體易之大體不神之神易之至神至神大體乃先天易也宣聖教人無思無爲寂然不動而體之無思則心寂然無爲則性不動大衆只這不動寂然時的主宰便是先天之妙無極之眞若能直下承當精誠默貫自然萬理昭彰一性太虛向平常隨機應用則不動而變無爲而成不行而至不言而信靜存動照誠已感通所以神化無方無幽不燭天地莫遷鬼神難測先儒謂須信畫前元有易誠哉言也噫公等只今了得一部易理都在自已千賢萬聖俱立下風其或未然看頌曰此舒直强名一一復還圓號太極不動動中闢翕機三才萬物歸吾宻歸吾宻處體中中一片太虛無眹跡證箇羲皇向上人先天天表樂眞逸第六十一則重陽祖師初至寧海范明叔之南園怡老亭丹陽眞人與其友戰師輩會飲一見祖師來問曰先生何方而來曰路遠三千里特來扶醉人丹陽作詩默有此句一見符契遂邀坐進禮問道曰五行不到處一炁未生前丹陽眞人驚起作禮有范明叔在傍曰此十字簡而且盡妙先生非神仙安能及此大衆祖師一見便指示生前面目象先至妙偉哉超出陰陽之表即五行不到處也復乎性命之先即父母未生前也丹陽眞人一聞即悟自此至終頓超然絶可謂眞實希有紫陽眞人云五炁歸元一眞反本即上義也大衆誠能神悟心通直下領會含光默默行將去豈不妙哉其或未然審聽予頌頌曰精神䰟𩲸意和混一作圓身心寂不動恍惚體象先非心亦非性非佛亦非仙粉碎大虛空先天天外天第六十二則玉蟾祖師云父母未生以前儘有無窮活路只今身心不動以後復有无極眞機㫖哉原夫未生以前純然元炁中含至寳生生之妙圓混無方所謂無窮活路也自有生以來赤子之心漸變本然眞性日遷識性雲障妄想霧昏終日泛流縁業何時澄淸本源故祖師慈憫以身心不動警拔我輩驀直反流歸源可謂切切矣所謂身心者非妄想肉心非氣血幻身乃本然靈慧無象法身也所以法身寂然則眞靜矣靈妙澄然則玉虛矣致虛靜篤復未始之大象无極之至眞體獨象先頓超物表可不簡妙哉大衆欲知之乎行之乎頌曰父母生前一點眞不空空象號元神靈虛眞靜中中妙恍爾自然無極春第六十三則司命三茅仙君詩云靈臺皎潔似冰壺秪許元神裏面居若向箇中添一物平生便是不清虛㫖哉大衆以此推之修行人先貴此心淸潔純素眞眞朴朴無一毫點染方可做箇淸靜道人丹陽眞君云酒色財氣心不了得玄得妙却如無故廉眞人云心死神方活情忘道自存今觀我輩心不死情未忘必切要冰灰這貪妄心嗔恨心愛慾心此三心先了得其他名利求逐等心自然消滅此三等心不了要脫離輪迴頓超生滅未敢相許諸公各各精誠早了早了同游泳無何有之鄉先天清虛妙境伏惟珍重頌曰止止休休貪妄息謙謙讓讓恨嗔冰慾根愛念最爲害了得自然超死生損神氣喪元精减切休掩耳暗偷鈴莫恠實菴言醜陋要伊耳瞎眼睛聾第六十四則元始天尊懸一寳珠大如黍米在空玄之中去地五丈元始登引天眞大神無鞅聖衆俱入寳珠之中不知所在大衆此一寳珠至微如何能包容千眞萬聖不知所在公等直下離諸五慾超出五行向這裏勘破則璇璣玉衡一時停輪四極朗淸萬法中融自然直超祖劫復乎天根上無復祖唯道爲身逍遥乎玉山上京游泳乎大羅玉淸美哉金蓮寳經文始博大眞人示衆拈一金蓮花於中現一寳珠放百寳光遍現十方法界又云奈諸衆生將此金蓮寳珠自沉泥穢甘受五濁昏昧光明若諸善根發一信心但能躍出諸塵垢自然清淨光明洞燭十方三界咸樂如是非我獨有以此推此一寳珠人人身中具足圓明所以道放開彌滿六合廣大包容歛則退蔵於宻鬼神莫測頌曰粟中蔵世界即芥納須彌一點玉虛妙萬法緫綱維含弘無盡蔵潜宻絶芒微罔象中中得寳光極耀輝入室三極則極則章一純清虛白妙眞心無昧圓輝耀古仐朴實道人當了徹安平放下樂希音予嘗謂丹臺無昧則精炁冲融靈府生塵則心神昏散予試問諸兄在此許時亦忖得自己血氣禀賦之性習染俗氣之性曾變得否貪嗔愛慾心利名情妄心才能好勝心聦明見解等心曾去了否其或未然既要了此眞功實妙便當一一絶跡勿留全身放下本然靈妙見前方可收拾歸來退蔵於宻這箇宻處仙眞强名神谷雅號玄關陰陽不到處父母未生前是我安身立命處誠能六慾不生三心泯没向喜怒哀樂未發寂然虛豁中中天目反觀罔象鼻孔默息從默息至眞息自眞息至定息六脉淵澄一眞恍惚湛兮似乎存朗然若我獨寥寥玉虛純純全全圓明冲漠虛白自然到這裏天地莫能遷其體日月莫能眩其明鬼神莫窺陰陽莫測通身是曰難措一言實菴太甚饒舌露泄天機高明誠能信得及力行將去水到成渠自然而然噫别人著力不得各請自理會珍重珍重極則章二始念隨流脗合形有身性命體元成心安恬澹性珠朗炁息冲融命寳靈性也命也固執一邊可乎原夫先天慧命未明本性則無主宰元始本然不修慧命則無安存若得性命妙融必要炁神宻混若夫欲明了本然眞性必先息心修煉未始慧命必實養炁息心在乎意澄情反養炁在乎神定息調尹眞君云情波也心流也性水也故命猶源也靜則體一動則名殊以此究竟多少分明且也喜怒哀樂愛惡慾情也因意感而有猶風生波起思慮念意根心也因事物而生猶水動流行寂然虛體澄湛明淸情也猶流反水澄元炁冲和綿宻氤氲命也猶滄海元源清徹若能情泯於心猶風定波澄心潜本性猶流歸水止性融於命猶水澄源紫陽師祖云風定波澄心珠光瑩碧潭淸淨性月圓暉全眞了心達本至命還元盡美在此是以透徹重關頓超向上明登實際得證眞空豈若肩板漢只見一邊癡禪客幽囚鬼窟故易繫云窮理盡性以至于命丹經所謂融了眞无自然妙有㫖哉子大不肖輕泄天機頓忘愆罪重爲細詳宻指高明誠心會得精進修持乃天付也心印經云上藥三品神與炁精恍恍惚惚窈窈㝠㝠所謂三品者乃元神元炁元精不有不空無聲無臭恍惚窈㝠元無定體三者本一一體三名嗟平人自有生心漸迷暗因意情動揺而化爲五精猶水神猶木炁猶火意猶土意土感而生情金金尅木神從木亂元神化爲識神水尅火炁從鼻散元炁化爲血氣土尅水精逐意慾元精化爲感合之精故隨順境人也逆止元仙也玉蟾師祖云五行順行法界火坑五行逆歸大地七寳紫陽祖師云四象五行全藉土夫意土能尅水而生金情能伏金情而制精水又云眞土制眞鉛眞鉛制眞汞鉛汞歸土釜身心寂不動大衆具眼具眼安靜身心調伏情意向眞陽萌處煉元精化元炁息元炁融元神凝元神體太虛超出五行之表巍獨三界之上種種誘喻悉是强名予今爲諸大德豁開天外眼睛通徹象先鼻孔會元始天尊與靈寳天尊圓混于鬱羅蕭臺卓爾希音未始巍然象帝先天噫玄元心印道統玄關向上眞機天仙丹寳盡淨明矣或問水濕火燥金流土崩時若之性命安在喝兵隨印轉將禀令行慧劔一揮魔軍膽碎雖然太平本是將軍定不用將軍始太平珍重珍重極則章三清淨冲虛純眞恬澹叅萬古而混一貫百王而極中體妙先天用明皎日此吾太上心法也俾夫志士泯人心而明徹道心絶物慾而完全天理虛心寂性息炁凝眞慧命金堅道心玉瑩超入玄關造无極奧是以列祖以心印心假言著道貴乎道德圓備性命雙隆體妙玉虛直超最上是謂上仙眞人捨此而他求皆是異端外道所以古之眞人其行恬恬其息深深其寢無寐其覺無憂不知悅生不知惡死故生而不有樂無生天死而不忘了無死地不化而化自然而然仐之我輩專以死生爲一大事因縁一曲偏見服膺憂念正謂空頭煩惱故尹眞人云人之横訐死生愈變情識止名爲妖不名爲道大衆誠能向此明了居圜入室和混從容無可不可噫妙眞常息元炁神無極體先天向二六時中於聲色有無動靜語默得大自在綽然無礙眞樂無窮多少慶快工夫誠此老夫許多言辭都無可用非天下精一極誠者其孰能與于此珍重珍重玄教大公案卷下

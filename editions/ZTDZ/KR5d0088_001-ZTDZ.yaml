  text: 玄教大公案卷上
  hash: sha256:1908b38cd4951295ef2c1983ab06be79d2304b2b12d4d71e2c8bc03e0671eb21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0088_SJB_001-230891a, image: sjb/23/230891a.png}
body:
  text: 金蓮道師實菴先生苗太素舉門人誠菴王志道集升堂明古六十四則第一則太上道德眞經云道可道非常道名可名非常名只這兩句掃盡三教一切有無聲色諸法使學者於動靜語默外宻宻承當故夫道也非形非相不色不空物物全彰人人本具乃天地未始之大象父母未生之至靈不屬思求非從言會蓋遣無定體心妙無方乃知不可道之道乃眞常之妙道不可名之名即本然之强名若執可名即成外道若執可道即是異端大衆既不可得而名道畢竟云何領會誠誠頌曰强名曰道嚼飯喂兒言思著意摸壁尋籬沉空滯寂幽入傍蹊屈伸存想泥法守規舉無默坐惺惺著迷觀心轉物自礙獃癡無無自縱放曠無知去識内覺帶水拖泥機鋒敏捷竪拂拈槌語默敲喝瞬目揚眉隨情說法即事起疑精𩲸熱亂識神弄竒大言闊說根本支離以此學解名道不悟悉墮狐狸寧如純純朴朴誠誠息息微微恍惚大虛體一生前面目巍巍誠會不神神的義掀翻衆妙樂希夷第二則太上云聖人處無爲之事行不言之教又云爲無爲又云道常無爲而無不爲㫖哉神領意會目擊道存卓爾於象帝之先超然於形骸之表此不言之妙也所謂無爲者非土木偶人推之不去呼之不來逼之不動塊然一物也貴乎一點靈明圓混混活潑潑無心爲而爲時止時行以輔萬物之自然所以道道常無爲而無不爲且道爲無爲者誰噫頌曰不言之妙無爲之益寂然咸感天下希及貫徹萬理融歸太一一歸何所混元无極无極中主生化不息生生無生綿綿宻宻不動動中烹紫金無爲爲處煅瓊璧嘻切忌錯識第三則太上云谷神不死是謂玄牝玄牝之門是謂天地根綿綿若存用之不勤此一篇盡道心妙有之玄慧命眞空之本空而無物虛而有靈無象之實象不神之元神是謂谷神也虛靈不昧即谷神不死也不昧虛靈强名玄牝樞機圓活故云玄牝之門此乃向上玄關虛無妙竅爲天地之根本性命之淵源闢翕元炁升降自然大衆撥轉玄關綿宻宻詔然皇極先天天頌曰谷神不昧性明圓玄牝闔闢造化旋獅子眼睛明朗朗象王鼻孔息綿綿千和萬合中綿宻一混三元體自然心息相依無間斷恍然父母未生前第四則太上云恍兮惚其中有物惚兮恍其中有象窈兮㝠其中有精只這物象是甚麽物象痍此三者不無不有非陰非陽五行不到處七情未發時是我本元實象无極至眞先天祖炁浩劫元精三者本一一體三身是謂清淨法身是謂妙有空身是謂眞無道身誠能元精固慾海枯則清淨法身圓眞息調業火滅則妙有空身徤元神凝妄心死則眞無道身著三身一混萬法中融光輝宇宙德備鴻濛大衆且道如何了當止止息息弩力努力頌曰非心非性亦非仙一體三身中混然寂寂凝神潜至宻綿綿息浩毓重玄慧風掃盡山頭雪劫火燒乾海底泉此乃極乘玄外妙知音仁德可心傳第五則太上云有物混成先天地生寂兮寥兮獨立而不改周行而不殆可以爲天下母昔日我祖純陽帝君語此一篇與南巖儼禪師同度湖南何祖師成證道果至今三眞一脉香火不絶後禪師以此義作一頌云有物先天地無形本寂寥包含萬象體不逐四時凋大衆只這一物是甚麽物師寂然良久云不與萬法同侣所以獨立而不改大圓通無斷滅所以周行而不殆得此道者能化化而不化能生生而不生故可爲天下母母道也痍誠誠誠頌曰誠誠誠極默中中一顆玄珠輝太空寂寂周通無眹跡寥寥獨立不雷同先天天表凝元炁無極極中振祖風體用大機明徹了生生化化妙無窮第六則太上云載營𩲸抱一能無離專炁致柔如嬰兒滌除玄覽能無疵明白四達能無知天門開闔能無雌愛民治國能無爲此一篇盡明心心明之妙見性性養之微養浩工夫金丹妙用悉備此章如抱一專炁乃純然無間也滌除玄覽瑩徹天心也能無疵心淸淨光明也明白四達見性而無礙也能無知含光厚養也天門開闔眞息綿綿而無間也身爲國爲民炁順身安爲而無爲也誠了此章金丹之道畢矣其或未然審予後頌頌曰陰𩲸營營擾陽䰟不得安抱一調元炁徹通玄上關心天純瑩玉性月印寒潭赤子金元體嬰兒復粹顔君享安國樂民無人我山䰟清𩲸靈聖大智樂閑閑第七則太上云三十輻共一轂當其無有車之用云此一章教人即物明本忘幻全眞轂因輻而成輪車因輪而成用當初本無以其斷木成器故假名曰車成車之用譬我一身上至泥九下至湧泉内則五臟外則四肢假合幻形當初本無以其有此幻形强名曰人成人之用形而上者曰道形而下者曰器故有形者以無爲便利中無形者以有爲運用器與室同一義且道只今無形中主如何了悟聻頌曰輻來輳轂車成用念復歸中道大通車運器成誰著力只今誰是主人公第八則太上云致虛極守靜篤萬物並作吾以觀其復此一章明入室大定復命歸根眞空實際切切眞功空諸幻有不染一塵曰虛萬法紛紜此心不撓曰靜工夫致極六脉俱澄一眞寂朗復其本然到這裏通身是曰難措一言我若露泄汝等工夫忽至此必然駡我饒舌我不說破又恐汝等到此著邪所謂不知常妄作凶也畢竟云何頌曰虛之又虛靜之又靜身心兩忘氣融神定一片玉虛天心光瑩復未生前誰凡誰聖非眞非仙非心非性本無可言亦非可證寂然誠誠中中宻印第九則太上云視之不見名曰夷聽之不聞名曰希摶之不得名曰微此三者不可致詰眞空無象視之不見大音希聲聽之不聞此妙也如雲出岫若月印潭難爲摸索摶之不得既非耳目所及拿捉不住又不可得而言問畢竟如何嘻此道也昭彰在上而不明皦潜宻在下而不昏昧所以仰之彌高放之彌滿六合鑚之彌堅收斂全無眹跡迎之莫見其首隨之莫見其後輝今耀古莫始莫終且道只今是誰主是誰御道來頌曰無形無影寂無聲耀古輝今號赤文妙有有如潭底月眞無無若嶺頭雲遇縁常默靈光照對鏡休生業火焚和會三元歸一極主人終日醉醺醺第十則太上云善行無轍跡善言無瑕謫善計不用籌策善閉無關楗而不可開善結無繩約而不可解可謂鬼神莫測方士莫知乃知聖人大機大用無門可入不可度思皆自然而然無可不可南華老仙言聖人終日行未嘗行終日言未嘗言故未嘗不行行必在道未嘗不言言必中節發無不中何必籌策無爲而成何必繩約故聖人之道一以貫之自然均齊方正美利天下自然條當寛弘故能常善救人常善救物作之君作之師不自愛貴不自矜伐雖大智慧同大愚人嗟乎我輩行不遵道言不中理甚至于思慮計較宻察關防賣弄精魂好爲師範自是自見自禍自殃去道遠矣若不直下悔過自新果行育德則安能承襲太上眞明光暉天下利益群生其或未然聽予頌曰行滿天下無怨惡言滿天下無口過倒携慧劔𠋣長空萬法來前迎刃破行時行之坐時坐飢則餐兮睡不卧中中默默襲明公就裏壼天如許大第十一則太上云道常無名朴雖小天下不敢臣心本無跡道常無名朴雖至小若微塵神用無方含造化端居萬象之先所以天下不敢臣也故得此道者頓超物表性象太空周流六虛動靜無礙是以道之在天下猶川谷之於江海氾兮其可左右微兮其可色聲瞻之在前忽焉在後雖然如是誠能萬縁頓息一念歸中方知道元來自有不必他來大衆還會否頌曰心即道兮道即心不勞思想别追尋利名雪化靈臺瑩恩愛冰消慧海深風捲塵清金虎伏雲收霧散玉龍吟天清皎日光圓朗萬籟寂鳴息大音第十二則太上云反者道之動弱者道之用原夫念有偏𠋣則以正反之心有妄想則以覺反之正覺然妙亦是道之動也聖人心若太虛淸淨自然無一毫偏妄點染體乎中道其正也覺也何用修爲故曰絶學無憂清淨爲天下正履謙處順和同柔弱禮也亦道之用也故天下萬物因生而有無生則無有矣大衆正以反邪覺以照妄猶是道之動道之用若自尊自是不反不弱則道之喪矣頌曰天下本無事人心自熱忙雨收山色翠雲散月圓光體道神清泰安常德義香誠中狂作聖偏妄聖爲狂本性無欺昧不必更叅詳第十三則太上云不出户知天下不窺牖見天道其出彌遠其知彌少是以聖人不行而至不見而名無爲而成夫天下猶一身天道即本心心虛明則天理昭彰身中正則天下安靜乃知道在自身向外求則遠矣明在本心向外觀則昧矣故聖人反身而誠便到家反照隱宻則明德著不動而變則不理當大衆多少省力又不費心還委悉否休休頌曰不涉程途便到家何須著境苦枝楂旻天清肅家家月春日和融處處花氣泰欵斟王母酒心清奚用趙州茶安閑自在全無事何必喃喃書五車第十四則太上云上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以爲道故建言有之夫上士元本清高根基純厚所以一撥便轉八達六通自然移掇不得天地莫遷輕輕快快綿綿宻宻精進力行終始無昧中人則業識牽纏利名縈絆未免半疑半信若存若亡小人驕矜濁富誇恃虛名專尚浮華憎嫌純朴故聞聖人之道則大笑之若使小人聞道而不笑則不足以爲至道故小人建設巧言笑侮有之不足爲怪夫何故達道了明之士頓忘形體若昏昧之人事物無心若退惰之人卑下混同類族平等大體潔白外若污辱廣德充滿常若不足建立陰德宻切若偷質朴眞純茫然若渝若大方無際大器緩成況大音希聲大象無形視聽不得道隱無名摸索不著清虛寂寞與彼相反已上皆下人可笑惟在道高明包容含恕善假方便委順曲化故曰善貸且成大衆修行人三千功八百行盡備此章勉旃勉旃頌曰物物中含太極眞奈人暴棄自蒙昏下愚執僻心茅塞上士虛中性玉純識性空無名本性凡人了達即眞人回光直入玄元境庶免區區再轉輪第十五則太上云生之徒十有三死之徒十有三人之生動之死地亦十有三夫何故以其生生之厚夫聖人不有去來了無生死是以太虛一體動靜不居嗟夫一切人此心無主忽起忽滅出機入機無有了期夫何故以其生生之厚欲養生之富厚則貪婪者衣食常不足富貴者利名常不足以其心常不足故縱六欲七情三尸六賊用心役力巧智其神致使心火上炎精水下濕水火相違以致病患苦楚至死未休惟達道者明悟虛幻情縁業識故反情復性虛心體道自然火不上炎水不下漏水火既濟神炁宻融果證無生故無死地乃知人之生動之死地皆由水火既未神炁合離故亦十有三也火數七水數六合十三也此章多解不一各執自見著相支離或言九竅四關十分有三分生七分死或以月之虧盈然合成數於切己進修全無干涉惟祖師玉蟾眞人言七情六欲先師言水火既未最爲切當上下文理順貫便得受用若情欲不息水火不濟則中無定主安能出得虎兕甲兵之驚懼以其神炁一融自然物我兩忘大衆明徹此章端的大義力行將去不必問生死事大已已頌曰人之生死藉陰陽超出陰陽自反常水火混融忘死地炁神宻固衛生方人牛俱泯性圓朗鷗我無情機兩忘假象指賢歸故里休迷相數弄文章第十六則太上云道生之德畜之物形之勢成之萬物莫不尊道而貴德道之尊德之貴夫莫之爵而常自然夫大道生生不窮玄德畜養平等物隨氣而賦形勢因時而成就是以萬物莫不尊道爲本貴德爲元故道之尊高長於上古而不先德之最貴成於萬物而不先故體道之士天下莫敢臣侯王莫能友常樂自然昔帝堯讓位許由先生辤而避之帝舜讓位善卷先生避之而入山又如莊子休於子陵辤黄金百鎰不受相位古今達道志士有至于三詔不赴者甚多可謂道之尊德之貴而莫之爵今之我輩未造實理不有眞功未知道妙深奧玄理幽微恃自井量管見扇惑愚俗彰揚曰鼓要譽利名不羞之甚上忝仙聖道風下縁市塵俗氣似此違避太上慈訓胡不寒心速改速改大衆爾等欲知之而速改乎欲奮志而力行乎嘻老拙更爲饒舌頌曰極品簪纓世慕之道人看破笑嘻嘻漚生漚滅莫多事花謝花開能幾時素履自然寧意馬實頥寧肯舍靈龜優游不事王侯志何愠人輕與不知第十七則太上云含德之厚比如赤子夫含養德性純純朴朴則比如赤子也赤子如初生嬰兒也未三月時元炁純粹元神菽冥不知動靜聲色兩手握固百骸柔軟一團和氣純純全全所以終日號哭而咽嗑不破嗄毒虫猛獸亦無螫傷蓋與物無心物亦無傷也太上以此喻修眞之士心切切矣我輩欲反本還源歸根復命以此爲則不亦簡妙乎今心無所主性不安閑安得元神凝寂元氣冲虛而比如赤子乎大衆執柯以伐柯其則不遠痍休休息息綿綿若存去頌曰含養工夫妙中中宻宻綿嬰兒心溟涬赤子性純全今古誰消息死生孰變遷太虛中大象玄外更無玄第十八則太上云爲無爲事無事味無味大衆此三句妙理如自家了徹則一眞洞徹萬行畢備其或未然老拙借口與汝等裝點如我輩省悟得世間一切事物俱是虛幻空華此心厭倦常慕幽靜處諸縁頓捨似古廟香鑪冷灰灰地默默然一切人事來如土水偶人相似判然不惹是則故是然則未然實非聖人眞清淨之妙夫何故聖人之心若懸寳鏡在堂物來則照物去則空隨機應變活潑潑圓混混虛豁豁明皎皎因其利而利之以輔萬物之自然無可不可乃爲而無爲也圓通萬變無所徃而不在乎道如王秉劔萬法來前迎刃而解乃事無事也咀玩道德精妙入神含養元炁冲和如飲玉液瓊漿乃味無味也大衆汝等欲知之乎欲力行之乎噫頌曰萬里無雲障碧天日正中圓明暉宇宙光朗曜虛空照物無私照通幽徹大通我心無點染何事不圓融方便和人事隨機闡祖風第十九則太上云千里之行始於足下只這一步向何處起脚大衆會麽師菽然良久空中畫一畫云夫大道驀直坦平寛闊無涯十極八方六通四達綽然無礙南華老仙云終日行而未嘗行多少省力全無眹跡誠向這裏會得回轉頭來力行將去忽然踏著故鄉縱前許多熟境路頭盡淨都忘所謂頓超物表遊咏仙鄉逍遥眞樂豈不美哉看頌曰舉歩不在脚也是涉途程不行行至妙無處不寛平心路誠虛絶天衢道大亨踏翻玄妙竅慶快樂無生第二十則太上云我有三寳持而守之一曰慈二曰儉三曰不敢爲天下先夫寛居仁行濟人利物憫惠一切謂之慈慈所以養乎天性也素分安常省心節事謹言愼行誠一无妄謂之儉儉所以養乎道心也虛以受人謙以自牧柔和卑下遜讓持後謂之不先不先所以養乎孔德也大衆誠能慈無敵於天下故曰勇誠能儉眞樂有餘故曰廣誠能不先謙尊而光卑而不可踰故能成其器長道人家若不慈不儉不謙不惟亡道凶禍隨之矣可不戒愼以保永終之元吉乎師下座端誠拜禮大衆而說頌曰富貴謙爲本尊高下作基謙謙君子吉行行惹人非克己心無昧恕人心不欺息心無可欲和順樂希夷第二十一則太上云言有宗事有君夫惟無知是以不我知知我者希則我者貴是以聖人披褐懷玉故志士樂道而忘賤安德而忘貧外雖狼藉内懷至寳故聖人本體圓明則大用美利無窮是以言言中節事事公當蓋言未發時中有宗本事未萌時中有君主夫惟無知此妙之人言多不善事多偏𠋣乃不知我道大體妙用寂然中主應化無方之故然知此道者希有誠能反觀本主卓然存乎中則言也事也無不條當無所徃而不利作之君作之師天人敬仰豈不超絶故曰則我者貴矣大衆且道只今言默作爲是誰主使頌曰七情未發妙六慾不生時寂寂誠忘我中中的是誰言言說奚說事事爲無爲美玉蔵中藴神珠光自輝嘻明明拈出家中寳無奈人迷不我知第二十二則太上云知不知上不知知病夫惟病病是以不病聖人不病以其病病是以不病前經云雖智大迷是謂要妙故達道之士若拙若愚若昏若訥洞徹本元含光寂照自昭明德光而不耀故曰知不知上也今之我輩未悟爲悟未明爲明螢光井量自爲了達强辭曰鼓賣弄精䰟此乃不知强知之節病也聖人秉氣純厚德性朴眞八達六通常若無知三才一貫常如不及以其中虛安靜恬退柔和並無昧己自欺好勝爭能自見自是許多節病故曰聖人不病以其病病是以不病大衆誠能頓覺自己昧心强知自是之節病克己改過自然明德日新樂天無窮矣頌曰百拙無能懶散人騰騰兀兀樂天眞人前默訥全無用就裏含容席上珍性若良金無雜僞心如美玉絶瑕垠休誇口鼓機鋒敏免爾勞叨墮法塵第二十三則太上云聖人不積既以爲人己愈有既以與人己愈多原夫天地乃無心聖人聖人乃有心天地天道運而無所積故生生化化美利天下而無害聖人虛而無所積故純純全全道濟天下而不爭所以厚養人民於己愈有博施濟衆於己愈多可謂法海寛弘而無盡蔵大衆只這利而無害爲而不爭的道妙常存日用天地大生之德聖人大化之仁盡在己矣伏惟珍重頌曰至道玄虛妙莫評樞機造化主生成乾坤健順生生化賢聖誠純化化生舜禹體天奚有害羲堯心道了無爭物豐時序人安泰天下淳風樂太平第二十四則文始妙道眞經曰一情冥爲聖人一情善爲賢人一情惡爲小人大衆一情善惡即不說且道一情㝠時如何領會嘻若就此處直下承當則天心朗朗成性存存其或未然聽予頌曰善惡雖然是二途道人不若悉捐除七情㝠息忽忘我一道圓光曜太虛第二十五則文始眞經云魚欲異群魚捨水躍岸即死虎欲異群虎捨山入市即擒聖人不異衆人時務不能拘耳乃知古者達道隱士明白四達默默昏昏故若愚若拙和光混世所以方士莫能知時行時止應感隨宜所以鬼神莫能測是以時務不能拘耳得大自在今之我輩恃斗筲之量彰螢火之光好爲人師做模作樣矜誇自是要譽沽名殊不知反招魔障以致災殃大衆聖人設喻魚躍岸虎入市以致喪身失命戒之深矣以此爲龜鑑都不如安貧養道素分樂天久久自然有無量快樂作箇本分道人豈不異哉頌曰弄巧翻成拙彰明莫若愚恃才招蹇剥本分得中孚索隱令人謗要名不自如安常能省事長泰樂無餘第二十六則文始眞經云聖人多斂萬有於一息無有一物可役吾之明徹散一息於萬有無有一物可間吾之云爲大矣哉夫人之一點虛靈大體大用在乎一息之間故放開則充塞乾坤綽然無礙收斂則潜歸黍粒全無眹跡靈靈無昧體用全彰事莫能遷物莫能間大衆誠能於此明悟了達則語默動靜得大自在且道只今如何體審息息頌曰惚焉天地表恍爾黍珠中獨立一毫上昭然體太空迎之不見首隨之不見踪倏爾忽相遇非彼亦非儂第二十七則文始眞經云聖人以有言有爲有思所以同乎人以未嘗言未嘗爲未嘗思所以異乎人南華老仙云終日言而盡道言言皆道終日言而盡物言言皆物道物之極非言非默以此推二祖師言意是一耶是二耶大衆誠能於此通徹則言也默也爲也息也悉自然而然無可不可其或未然反照去頌曰堂前懸寳鑑圓朗絶鑯塵照者從其照人觀亦聽人妍醜都自見此鏡了無心目觀耳聽得方許爾知音第二十八則文始眞經云聖人道雖虎變事則鱉行道雖絲紛事則碁布又道雲之捲舒禽之飛翔皆在虛空中所以變化不窮聖人之道亦然乃知聖人條當天下寂然神化文彩全彰應變隨機均齊弘道夫何故聖人大體玉虛純然無礙所以任其所化雲龍禽翔風雷雨霧變化不常大虛未嘗變遷大衆今我輩常常沉滯聲色迷惑有無著物肆情强能多事所以云爲失措動止有妨安得本性大虛綽然自在噫若之何各自理會頌曰威風凛肅鬼神莫測和氣雍容美利萬物爲而無爲欲其不欲飄然無礙不疾而速第二十九則文始眞經云蜣蜋轉丸丸成而精思之而有蝡白者存丸中俄去殻而蟬彼蜣不思彼蝡奚白乃知玉不琢則不成器天不寒則不結冰大衆我輩實非天生聖人欲學聖人之道須假修習眞眞實實純純朴朴切切下工夫始得眼下胡枝撑曰鼓胡擺撥濟箇甚事聖人以蜣蜋轉丸精思志一虛白中輝蛻殻而蟬物類尚然用工而成我輩豈不爾思所以道修及無修是爲眞修學至無學方名絶學今塊然一物蠢爾無知云不必下工夫絶學無憂正所謂隔靴爬痒枝撑擺撥久久都無結果可不勉之老拙自覺饒舌伏惟珍重頌曰一聞頓徹妙玄玄福慧根深夙善縁性命雙融圓太極形神俱妙體先天逹摩九載玉心瑩文祖六年金志堅今古上仙超越者皆由功德得成仙第三十則文始眞經云衆人以𩲸攝䰟者金有餘則木不足也聖人以䰟運𩲸者木有餘而金不足也故木喻魂喻性金喻𩲸喻情常人隨情逐妄故情有餘而性不足也聖人攝情歸性故性有餘而情不足也故修眞之士淵情泯識則本性圓明而無欠餘死𩲸安魂則慧命堅固而無滲漏性情混然則金木無間矣雖然喜怒哀樂愛惡慾皆情也菽湛圓明性也性一而情七彼衆我寡所以常被業力勝吾道力大衆且道如何勝得這七箇畜生嘻别人難著力頌曰七箇大魔鬼常害主人公主人無志力營𩲸騁英雄慧劔誅白虎靈宫卧玉龍太平無箇事鼓腹樂玄風第三十一則文始眞經云人之計生死者或曰死已有或曰死已無或曰死已不有不無或曰當喜者或曰當懼者或曰當任者或曰當超者愈變情識大衆今之修行人皆言爲生死事大以此經義推之都是空頭煩惱有無無有喜懼任超愈變情識殊不知我本無生孰云爲死予嘗謂死生乃晝夜之常則要心無遷易去來乃動靜之變則要性無昧昏故南華老仙云死生亦大矣無以動其心雖然如是也要只今分曉方爲了事人夫何故誠能日用間逆順不能遷則夜間夢寢不能昧夢覺既如一死生了無礙其或未然且請究竟頌曰我本無來去誰云有死生日月常出没太虛何暗明逆順心無染夢境自然清無生眞樂妙歷劫慶昇平第三十二則文始眞經云意有變心無變意有覺心無覺惟一我心則意者塵徃來爾事者倏起滅爾吾心有大常者存故心喻火也意喻土也火生土猶心生意也無心則無意無意則無情是以情生而意覺舉意而心照也大衆日用間以此照覺則情識俱空事物兩忘應用隨機忽起忽滅皆浮浮然夫何故吾心有大常主宰存焉還會否痍頌曰雲去雲來山靜止潮生潮退海澄平潮雲無意時來徃山海無心日翠清第三十三則文始眞經云有人問於我曰爾何族何氏何名何字何衣何食何友何僕何琴何書何古何今我時默然不對一字或人叩之不已我不得已而應之曰尚自不見我將何爲我所予嘗見朱文公語録云禪自道家起釋氏於道家經典抽出翻頭換面做寳蔵賣弄予始疑之思道家安有禪及熟玩此經及南華等經方知文公不虛說矣信乎馮尊師云鳩摩羅什未生已有南華列子文始眞人設此幾問云不對一字大衆是否誠能於此悟的切當忽然省得眞仙微妙已對了也其或未然且向尚自不見我將何爲我所叅詳去頌曰有人問於我將何爲我所直面定心拳教伊無處趓無處趓無處趓第三十四則文始眞經云譬如大海能變化億萬蛟魚水一而已我之與物蓊然蔚然在大化中性一而已知夫性一者無人無我無死無生夫三才萬類皆自太極中變而有自各賦形以來物物具一太極存一天理在大化中生化化生而無窮況心流精衮事風物浪無時定止所以自古至今翻形換殻不得超脫大衆誠能悟此虛幻空華忘物省事反情息心自然一性圓明不與萬法混這箇主人公超然自在倒大來輕輕快快又何人我死生之疑礙乎珍重珍重頌曰魚龍變化皆同水人我生成總一心同異異同忘彼此黄金同土土同金噫純然一性太空體寂寂明明絶古今第三十五則文始眞經云均一物也衆人或其名見物不見道賢人析其理見道不見物聖人合其天不見道不見物一道皆道不執之即道執之即物周易孔聖繫辭云形而上者謂之道形而下者謂之器器亦物也故君子體物而不遺㫖哉釋氏云人能轉物即同如來以此章妙推之費力不少夫何故物自物我自我何必轉何必去是以聖人純一不雜體合乾坤自然物我兩忘道心不二大衆誠能如此見徹同物我全天理這箇主人公活潑潑圓混混綽然無礙無可不可體妙象先頓超物表眞樂無窮又何固執意我矣珍重珍重頌曰滯有到頭成幻妄執無畢竟墮頑空有無不立心超絶不明通處亦明通第三十六則文始眞經云天地萬物無有一物是吾之物物非我物不得不應我非我我不得不養雖應物未嘗有物雖養我未嘗有我勿曰外物然後外我勿曰外形然後外心道一而已不可序進大哉聖人之言歟物來則應應之以誠物去則空寂然無著所謂不即不離也夏葛冬裘飢餐渴飲安分隨宜時行時止皆平常本分事也可用則用可休便休隨時消息輔合自然又不用心亦不費力所謂事于無事爲而無爲多少輕快又何外物外形外心之分别大衆應物忘物養我忘我自然一了百當本性超然故曰道一而已不可序進頌曰對境如無境同塵絶點塵我人俱不礙大地法王身一徹萬融無箇事乾坤内外緫吾身玄教大公案卷上

body:
  text: 玄教大公案序下一道統之傳其來久矣始太上混元老祖以象先之妙强名曰道而立言以德輔翼之而五千言著其中然存言外之㫖微妙玄通有不可得而言者深不可識亦强爲形容焉自道德受關令尹子其十子各得其妙如列莊諸子至安期生李仙卿葛仙翁衆眞更相授受各有經典然枝分派利於洞天福地亦代不乏人自周漢以來惟尹子嗣祖位金闕帝君繼道統授東華帝君帝君傳正陽鍾離仙君鍾傳純陽吕仙君吕傳海蟾劉仙君劉南傳張紫陽五紫北傳王重陽七眞道統一脉自此分而爲二惟清菴李君得玉蟾白眞人弟子王金蟾眞人授受爲玄門宗匠繼道統正傳以襲眞明亦多典集見行于世實菴苗太素師事之心印其要蓋青出于藍而青于藍者也實菴抱負此道以列祖道統心法模範學人採摭諸經樞妙升堂入室舉其綱要於列祖言外著一轉語復頌録之以易數爲六十四則又入室三極則門弟子王誠菴輩集成編名曰玄教大公案言言明本句句歸宗體用一眞圓混三教使人於羲皇畫外縱横玄聖象先游泳至哉華陽眞逸唐公捐金繡梓以廣其傳義亦宏矣誠有决烈漢向此大公案外具無極眼睛覷得七穿八透豁然四達六通則道統明明相繼而無息豈不美歟金陵淵嘿道人柯道冲敬序无極天心中融萬法象先慧目圓燭無方性至虛則八達六通心雲障則千差萬别是故欲得豁開天外眼必先明了世間心僕幼習儒業長慕玄風每研理性之元叅究天道之妙遍求愈遠默探愈深果謂不可得而聞也夙生何幸得詣中和時聞實菴老師法誨使人累釋心清而造元返本神凝氣息而安命樂天切切多方諄諄曲化一日中和上足出示師之升堂入室舉演法海寳珍道統心法詩頌目之曰玄教大公案僕靜咀玩見其剖判一元結絶萬法抖擻群眞骨髓貫通列祖肝腸爲人硎慧劔礪神鋒斬三尸誅六賊解縛纏脫桎梏破憂疑網斷煩惱障活死漢救生靈誘明達徹大用大機造極乘極奧優游未始眞樂無生其性理天道之妙明心見性之機圓混于中一一明白誠此透徹豈果不得聞歟然此亦皆師之緒餘耳僕既霑受用欣然不揣命工繡梓與天下福慧大丈夫同向此按欵中具一隻眼拶翻關捩粉破太虛全本然反純朴逍遥无極嘯傲先天是所願也金陵青溪九曲逸民唐道麟頓首謹識聖仙至道體玄先天用妙萬法以精誠中息而宻固本元以謙敬和順而美利天下實菴先生玄教大公案體用全彰行功圓備融一眞而入妙混萬理以歸元俾夫養元炁融冲慧命寂本性安平道心偉乎美矣豈憂寂空無機鋒口鼓一曲異端之比哉僕昔聞先生補註伊川易傳三分未盡之㫖默然驚嘆曰伊川先生乃前宗六夫子中一夫子尚有未盡今實菴先生補註其未盡是何人也恨不能飛見偶授南臺職暇日與同僚三五特踵中和相訪一見先生清寂安恬淡如也及乎熏敬請益雍容豁達隨問隨答的當通暢使人廓如也又得觀補註易傳未盡及易網解惑果謂辭簡理貫純粹精明將僕等積年叅學疑難一旦冰釋如大公案始一則將三教樞機精妙中正體用偏執見解已盡剖判中引諸經一事一理一玄一妙若對鏡觀形精粗圓照如云三身混極六慾沉空虛極反元動靜體道以寛慈養天性以儉約養道心以謙巽養玄德曰用五音毒氣十般貞病至于舉兼山之艮明靜止眞功題日昃之離明死生妄幻畫前至妙象外重玄秉羲皇寳劔劈開列聖玄關現元始黍珠照徹群仙天谷實前代道儒宗師皆未嘗道可謂妙超今古玄混始終非先天之高明其孰能與于此宣聖云先天而天弗違信哉僕敢不師禮事之兹略序師之道德體用事理實跡其先天言前之妙在乎同志慧力綿宻中之體式行臺監察御史王主敬從義頓首序引眞金不懼火煆煉愈精明美玉絶纖瑕琢磨成寳器朽木憊鐵匠手難爲故南華老仙云有聖人之才受聖人之道易矣或生而知之者幾何人哉然夙根靈慧一徹萬融亦在乎明師提挈方可直超最上我輩福薄根鈍業力常勝道力大言直超頓徹恐亦自昧耳若從師匠煉琢自誠明而虛通猶戒定而慧徹步步踏實地心心體太空久久澄攪不濁攧磕不碎自然純粹堅固豈不美哉吾師實菴仙翁道隆方外教闡環中發明太上心玄剖判羲皇骨髓掀翻三教融混一元掃蕩邪宗豁開正道斲削後學造大本宗烹鍊高明達先天境是以良朋霞友雲集明公賢相風從虛而徃實而歸誠不言而信近者悅遠者來咸無爲而成乃知言未嘗言弘衆妙迥出思議之表道非常道備萬德獨立象帝之先非極高明而通至化者其孰能與于此僕日侍玄堂幸霑法雨録集升堂之珠玉緝熈入室之寳珍然義適多方理歸一極歷代聖仙未結絶案欵吾師一一决斷明白目之曰玄教大公案列成六十四則以象周易六十四卦入室三極則以象三極誠有决烈漢直下承當煅鍊向中默會力行泯聲色淵識情瑩天心開道眼頓超生滅耀徹古今大用大機咸備於斯其眞樂奚可勝計哉誠能如是庶不負吾師諄諄之教亦乃千載一時之遇也雖然僕亦駕渡舟一夫云耳泰定甲子門弟子誠菴王志道頓首敬序
